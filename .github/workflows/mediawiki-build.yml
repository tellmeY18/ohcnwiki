# CI: Build MediaWiki with extensions (multi-arch, native runners)
name: Build MediaWiki Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "nginx.conf"
      - "healthcheck.php"
      - "maintenance/**"
      - ".github/workflows/mediawiki-build.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tellmey18/ohcnwiki

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          BUILD_TAG="build-${{ github.run_number }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.build_tag }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          BUILD_TAG="build-${{ github.run_number }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          docker buildx imagetools create -t "${IMAGE}:${BUILD_TAG}" -t "${IMAGE}:${SHA_TAG}" \
            "${IMAGE}:${BUILD_TAG}-amd64" \
            "${IMAGE}:${BUILD_TAG}-arm64"

          echo "## 🎉 ohcnwiki Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${BUILD_TAG}\` | \`${IMAGE}:${BUILD_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${SHA_TAG}\` | \`${IMAGE}:${SHA_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Update deployment: \`image: ${IMAGE}:${BUILD_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
